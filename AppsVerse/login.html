<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONYX CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        /* ================= RESET & LUXE BASE ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #bc13fe;
            --accent-pink: #ff007f;
            --neon-blue: #00f2ff;
            --dark-bg: #050505;
            --glow: 0 0 20px rgba(188, 19, 254, 0.6);
            --glow-blue: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--dark-bg);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
        }

        /* Animated Gradient Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a002a 0%, #050505 100%);
            z-index: -2;
        }

        /* Moving Grid */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(188, 19, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 40px 40px; }
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.2;
            filter: hue-rotate(270deg) brightness(0.4);
        }

        /* ================= CONTAINERS ================= */
        .view-container {
            width: 100%;
            max-width: 440px;
            padding: 45px 35px;
            position: relative;
            z-index: 10;
            display: none;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(188, 19, 254, 0.1);
            text-align: center;
        }

        .view-container.active {
            display: block;
            animation: luxeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes luxeIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ================= BANNER MP4 ================= */
        .video-banner {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid var(--neon-blue);
            box-shadow: var(--glow-blue);
            position: relative;
        }

        .video-banner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ================= LOGO & TITLES ================= */
        .logo-wrapper {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px;
            border-radius: 30px;
            background: linear-gradient(45deg, var(--primary-purple), var(--accent-pink));
            padding: 4px;
            box-shadow: var(--glow);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 26px;
            object-fit: cover;
            border: 3px solid #000;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .main-subtitle {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: var(--neon-blue);
            letter-spacing: 4px;
            margin-bottom: 35px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ================= BUTTONS & ANIMATED BLUE ================= */
        .btn-blue-moving {
            width: 100%;
            background: linear-gradient(-45deg, #00d2ff, #3a7bd5, #00f2ff, #004e92);
            background-size: 400% 400%;
            border: none;
            border-radius: 18px;
            padding: 20px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            animation: gradientMove 3s ease infinite;
            position: relative;
            overflow: hidden;
        }

        .btn-blue-moving:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ================= INPUTS WITH MOVING GLOW ================= */
        .input-field-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-style {
            width: 100%;
            padding: 18px 55px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid transparent;
            border-radius: 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.5s;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                linear-gradient(90deg, var(--neon-blue), var(--primary-purple), var(--neon-blue));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 200% 100%;
            animation: borderMove 4s linear infinite;
        }

        @keyframes borderMove {
            from { background-position: 0% 0%; }
            to { background-position: 200% 0%; }
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-blue);
        }

        .toggle-pass {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #555;
        }

        /* ================= HOME SPECIFIC ================= */
        .banner-box {
            width: 100%;
            height: 180px;
            background: #000;
            border-radius: 25px;
            margin-bottom: 35px;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.3);
            position: relative;
        }

        .banner-jpg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .character-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            z-index: 5;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-red {
            flex: 1;
            background: linear-gradient(45deg, var(--primary-purple), #7a0bc0);
            border: none;
            border-radius: 18px;
            padding: 18px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3);
        }

        .btn-outline {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--neon-blue);
            border-radius: 18px;
            padding: 18px;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        /* ================= LOADING SCREEN ================= */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loading-text {
            font-family: 'Orbitron';
            font-size: 22px;
            color: #fff;
            margin-bottom: 25px;
            letter-spacing: 10px;
            font-weight: 900;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .sidebar-loading {
            width: 280px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .sidebar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--primary-purple));
            animation: fillSidebar 9s linear forwards;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes fillSidebar {
            from { width: 0%; }
            to { width: 100%; }
        }

        #customPopup {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            z-index: 10000;
            display: none;
            font-weight: 900;
            font-family: 'Orbitron';
            font-size: 12px;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .copyright-footer {
            margin-top: 40px;
            font-size: 10px;
            color: #444;
            font-family: 'Orbitron';
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <audio id="bg-music" autoplay loop playsinline>
        <source src="https://h.top4top.io/m_3632finac1.mp3" type="audio/mp3">
    </audio>

    <audio id="loading-music" playsinline>
        <source src="https://files.catbox.moe/hy1swu.mp3" type="audio/mp3">
    </audio>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="https://j.top4top.io/m_3824tmjzg0.mp4" type="video/mp4">
    </video>

    <div id="customPopup">Isi Username & Password!</div>

    <div id="view-home" class="view-container">
        <div class="video-banner">
            <video autoplay muted loop playsinline>
                <source src="https://j.top4top.io/m_3824tmjzg0.mp4" type="video/mp4">
            </video>
        </div>

        <div class="logo-wrapper">
            <img src="https://f.top4top.io/p_3824osd0p0.png" onerror="this.src='https://f.top4top.io/p_3824osd0p0.png" class="logo-img" alt="Logo">
        </div>

        <h1 class="main-title">ONYX CORE</h1>
        <p class="main-subtitle">Developer</p>

        <div class="banner-box">
            <img src="https://g.top4top.io/p_3824alz070.png" class="banner-jpg" alt="Background">
        </div>

        <div class="button-row">
            <button class="btn-red" id="btnLoginNav">
                <i class="fas fa-fingerprint"></i> LOGIN
            </button>
            <button class="btn-outline">
                <i class="fab fa-whatsapp"></i> REGISTER
            </button>
        </div>

        <a href="https://www.youtube.com/@nekozoshop" target="_blank" style="text-decoration:none;">
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--neon-blue); color: #fff; font-family: 'Orbitron'; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fab fa-youtube" style="color: var(--neon-blue);"></i> JOIN CHANNEL ONYXCORE
            </div>
        </a>

        <div class="copyright-footer">
            &copy; 2026 OnyxCore | Project
        </div>
    </div>

    <div id="view-login" class="view-container">
        <div class="video-banner">
            <video autoplay muted loop playsinline>
                <source src="https://j.top4top.io/m_3824tmjzg0.mp4" type="video/mp4">
            </video>
        </div>

        <h2 class="main-title" style="font-size: 26px;">ONYXCORE</h2>
        <p class="main-subtitle" style="font-size: 12px; margin-bottom: 25px;">Developer</p>

        <form method="POST" action="/auth" id="serverForm" style="display:none;">
            <input type="text" name="username" id="realUser">
            <input type="text" name="key" id="realPass">
        </form>

        <div class="input-field-group">
            <i class="fas fa-id-badge input-icon"></i>
            <input type="text" id="visUser" class="input-style" placeholder="Username">
        </div>

        <div class="input-field-group">
            <i class="fas fa-shield-alt input-icon"></i>
            <input type="password" id="visPass" class="input-style" placeholder="Access Key">
            <i class="fas fa-eye-slash toggle-pass" id="toggleBtn"></i>
        </div>

        <button class="btn-blue-moving" id="btnLoginSubmit">
            VERIFY SYSTEM
        </button>

        <button id="btnBackToHome" style="margin-top: 25px; background:none; border:none; color:#555; cursor:pointer; font-family:'Orbitron'; font-size:10px; letter-spacing:2px; transition: 0.3s;">
            <i class="fas fa-chevron-left"></i> BACK TO GATEWAY
        </button>
    </div>

    <div id="loadingScreen" class="loading-screen">
        <div class="loading-text">INITIALIZING</div>
        <div class="sidebar-loading">
            <div class="sidebar-fill"></div>
        </div>
        <div style="margin-top: 20px; font-family: 'VT323'; color: #444; letter-spacing: 2px;">Establishing secure connection...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const viewHome = document.getElementById('view-home');
            const viewLogin = document.getElementById('view-login');
            const loadingScreen = document.getElementById('loadingScreen');
            const bgMusic = document.getElementById('bg-music');
            const loadingMusic = document.getElementById('loading-music');
            const btnLoginNav = document.getElementById('btnLoginNav');
            const btnLoginSubmit = document.getElementById('btnLoginSubmit');
            const visUser = document.getElementById('visUser');
            const visPass = document.getElementById('visPass');
            const toggleBtn = document.getElementById('toggleBtn');
            const popup = document.getElementById('customPopup');
            const serverForm = document.getElementById('serverForm');
            const realUser = document.getElementById('realUser');
            const realPass = document.getElementById('realPass');
            const btnBackToHome = document.getElementById('btnBackToHome');

            bgMusic.volume = 0.4;
            loadingMusic.volume = 1.0;

            const startInteraction = () => {
                bgMusic.play().catch(() => {});
                document.removeEventListener('click', startInteraction);
            };
            document.addEventListener('click', startInteraction);

            const urlParams = new URLSearchParams(window.location.search);
            const serverMsg = urlParams.get('msg');

            if (serverMsg) {
                localStorage.removeItem('silentUser');
                localStorage.removeItem('silentPass');
                showPopup(decodeURIComponent(serverMsg));
                viewLogin.style.display = 'block';
                viewLogin.classList.add('active');
            } else {
                viewHome.style.display = 'block';
                viewHome.classList.add('active');
            }

            btnLoginNav.addEventListener('click', () => {
                const savedUser = localStorage.getItem('silentUser');
                const savedPass = localStorage.getItem('silentPass');
                if (savedUser && savedPass) {
                    realUser.value = savedUser;
                    realPass.value = savedPass;
                    viewHome.style.display = 'none';
                    startLoadingSequence();
                } else {
                    viewHome.style.display = 'none';
                    viewLogin.style.display = 'block';
                    setTimeout(() => viewLogin.classList.add('active'), 10);
                }
            });

            toggleBtn.addEventListener('click', () => {
                const type = visPass.getAttribute('type') === 'password' ? 'text' : 'password';
                visPass.setAttribute('type', type);
                toggleBtn.classList.toggle('fa-eye');
                toggleBtn.classList.toggle('fa-eye-slash');
            });

            btnLoginSubmit.addEventListener('click', () => {
                const u = visUser.value.trim();
                const p = visPass.value.trim();
                if (!u || !p) {
                    showPopup("Isi Username & Password!");
                    return;
                }
                localStorage.setItem('silentUser', u);
                localStorage.setItem('silentPass', p);
                realUser.value = u;
                realPass.value = p;
                viewLogin.style.display = 'none';
                startLoadingSequence();
            });

            btnBackToHome.addEventListener('click', () => {
                viewLogin.classList.remove('active');
                viewLogin.style.display = 'none';
                viewHome.style.display = 'block';
                setTimeout(() => viewHome.classList.add('active'), 10);
            });

            function startLoadingSequence() {
                bgMusic.pause();
                loadingMusic.play().catch(() => {});
                loadingScreen.style.display = 'flex';
                setTimeout(() => {
                    serverForm.submit();
                }, 9000);
            }

            function showPopup(msg) {
                popup.innerText = msg;
                popup.style.display = 'block';
                setTimeout(() => {
                    popup.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>

</html>
